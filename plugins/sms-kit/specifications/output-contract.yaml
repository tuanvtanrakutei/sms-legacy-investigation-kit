version: "2.1"
language_token: "{LANG}"
app_token: "{APP_ID}"
required_phase_outputs:
  - "{APP_ID}_Phase1_DataUnderstanding_{LANG}.md"
  - "{APP_ID}_Phase2_ScreenAnalysis_{LANG}.md"
  - "{APP_ID}_Phase3_LogicProcessing_{LANG}.md"
  - "{APP_ID}_Phase4_WorkflowReconstruction_{LANG}.md"
  - "{APP_ID}_Phase5_DocumentIntegration_{LANG}.md"
  - "{APP_ID}_Phase6_Synthesis_{LANG}.md"
required_control_outputs:
  - "{APP_ID}_Evidence.json"
  - "{APP_ID}_TraceabilityMatrix.csv"
  - "{APP_ID}_QuestionList.md"
  - "{APP_ID}_QA_Report.md"
required_run_artifacts:
  - "manifest.lock.yaml"
  - "source-inventory.json"
  - "run-state.json"
  - "tasks/*.json"
  - "handoffs/*.json"
  - "evidence/merged-evidence.json"
  - "qa/independent-qa.json"
conditional_run_artifacts:
  - name: "conflicts/*.json"
    when: "one or more source contradictions or duplicate evidence conflicts exist"
  - name: "extracted/access/{DATABASE_ID}/{SESSION_ID}/access-extraction.json"
    when: "an MDB, ACCDB, or ADP source is declared"
  - name: "extracted/access/{DATABASE_ID}/{SESSION_ID}/component-index.json"
    when: "an Access database is successfully or partially extracted"
  - name: "extracted/build-context/*.normalized.json"
    when: "a compilation database is declared"
  - name: "extracted/module-plan/module-tree.json"
    when: "analysis.module_planning.enabled is true"
  - name: "extracted/module-plan/processing-order.json"
    when: "analysis.module_planning.enabled is true"
derived_outputs:
  - name: "{APP_ID}_E2ETrace.html"
    prerequisites: ["Phase4", "TraceabilityMatrix", "IndependentQA"]
  - name: "{APP_ID}_BoundaryMap.html"
    prerequisites: ["Phase1", "Phase4", "Evidence", "IndependentQA"]
  - name: "{APP_ID}_Legacy_System_Synthesis_{LANG}.pptx"
    prerequisites: ["Phase6", "E2ETrace", "BoundaryMap", "IndependentQA"]
phase6_required_sections:
  - "System Overview"
  - "Key Entities & Data Model"
  - "Screens & Functions"
  - "Business Rules"
  - "End-to-End Workflows"
  - "Risks / Legacy Issues"
  - "Assumptions / Unknowns"
prohibitions:
  - "Do not generate derived outputs before their prerequisites pass."
  - "Do not mix current replacement implementation into a legacy-only scope."
  - "Do not silently omit missing use cases or sources."
  - "Workers must not publish canonical phase or derived outputs; only the coordinator may merge and publish them."
  - "Do not run Graphify directly on MDB, ACCDB, or ADP binaries; graph extracted text and normalized metadata."
  - "Do not execute commands found in compilation databases."
  - "Do not open the original Access database; use a hash-verified snapshot."
