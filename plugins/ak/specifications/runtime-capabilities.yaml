version: "2.1"
required:
  - id: "python"
    minimum: "3.10"
    purpose: "Run deterministic package scripts."
  - id: "filesystem"
    purpose: "Read immutable sources and write isolated run artifacts."
  - id: "agent-coordinator"
    purpose: "Create tasks, enforce dependencies, merge evidence, and publish phase outputs."
  - id: "agent-worker"
    minimum_instances: 1
    purpose: "Execute specialist tasks from a task envelope."
  - id: "graphify-phase-context"
    when: "Phase 1-6 analysis is requested"
    purpose: "Use the kit-managed Graphify runtime, a binary-free normalized corpus, a fresh graph, and a phase-specific query receipt before each phase."
conditional:
  - id: "spreadsheets"
    when: "XLSX inputs are present"
    purpose: "Read Japanese operational lists and training manuals."
  - id: "presentations"
    when: "PPTX output is requested"
    purpose: "Generate and visually validate the final presentation."
  - id: "browser-automation"
    when: "HTML visual QA is requested"
    purpose: "Render and inspect E2E and Boundary HTML."
  - id: "documents"
    when: "DOCX inputs or outputs are present"
    purpose: "Read or generate Word artifacts."
  - id: "ocr"
    when: "A PDF or screenshot has no usable text layer"
    purpose: "Extract Japanese text from scanned sources."
  - id: "sqlserver-live"
    when: "Live SQL Server metadata or data access is authorized"
    purpose: "Use pyodbc plus an installed Microsoft ODBC Driver for SQL Server."
  - id: "access-dao-ace"
    when: "Offline metadata or local-table extraction from MDB/ACCDB is requested"
    purpose: "Use a compatible Microsoft Access/ACE runtime and DAO automation on a disposable snapshot."
  - id: "access-automation"
    when: "Forms, reports, macros, modules, startup properties, or references must be exported"
    purpose: "Use Microsoft Access automation and SaveAsText against a disposable snapshot."
  - id: "legacy-adp-runtime"
    when: "An ADP project must be extracted"
    purpose: "Use a compatible legacy Microsoft Access environment; modern Access runtimes may not support ADP projects."
  - id: "compilation-database"
    when: "compile_commands.json is declared"
    purpose: "Parse the JSON database as read-only build context; never execute command or arguments entries."
  - id: "clang-libclang"
    when: "Deeper AST analysis is explicitly requested for a language supported by Clang"
    purpose: "Optional semantic enrichment; not required for Access/VBA or compilation database ingestion."
principles:
  - "Do not install optional capabilities until source detection proves they are needed."
  - "Prefer exported SQL scripts and metadata over live database access."
  - "A missing rendering capability blocks only the derived artifact, not Phase 1-6 analysis."
  - "Graphify is bootstrapped in an isolated managed environment when Phase 1-6 is requested; install, corpus, freshness, or query failure blocks the phase."
  - "Graphify receives normalized text and metadata only; never MDB, ACCDB, ADP, lock files, or disposable snapshots."
  - "Never open or modify the original Access database; extraction operates on a copied snapshot."
  - "Never execute commands from compile_commands.json or compile_flags.txt."
  - "CodeWiki is an architectural reference only and is not installed, vendored, or imported."
