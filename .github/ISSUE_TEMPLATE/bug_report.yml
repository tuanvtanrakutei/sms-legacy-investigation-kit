name: Bug report
description: Report reproducible package behavior using synthetic data.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not attach real databases, credentials, customer documents, or proprietary corpora.
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: 2.1.7
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options: [Codex, Claude, Generic, Deterministic scripts only]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Include commands and sanitized fixture details.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation output
      description: Include relevant validator or test output with secrets removed.
