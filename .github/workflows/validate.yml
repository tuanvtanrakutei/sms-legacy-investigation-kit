name: Validate

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: plugins/ak/requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r plugins/ak/requirements-dev.txt

      - name: Compile Python scripts
        run: python -m compileall -q plugins/ak/scripts plugins/ak/tests

      - name: Validate package contracts
        run: python plugins/ak/scripts/validate_structure.py --package plugins/ak --repository-root .

      - name: Run synthetic tests
        run: python -m pytest -q

      - name: Parse Access PowerShell adapter
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path plugins/ak/scripts/extract_access.ps1),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
